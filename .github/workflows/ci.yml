name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Lint JSDoc
        run: yarn lint:jsdoc

      - name: Test
        run: yarn test

      - name: Coverage
        run: yarn test:coverage

      - name: Build
        run: yarn build

      - name: Packaging smoke tests
        run: yarn test:packaging

      - name: Pack smoke test
        run: npm pack --dry-run
